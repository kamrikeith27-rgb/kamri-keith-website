<!-- @dsCard group="Brand" viewport="700x210" name="Imagery treatment" subtitle="Action photo + ink protection gradient" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-page);padding:20px 24px;display:flex;gap:16px}
.fr{flex:1;height:170px;border-radius:var(--radius-lg);overflow:hidden;position:relative;border:1px solid var(--border-subtle)}
.fr img{width:100%;height:100%;object-fit:cover;display:block}
.grad::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(15,18,22,.85),rgba(15,18,22,0) 65%)}
.duo img{filter:grayscale(1) contrast(1.05)}
.duo::after{content:"";position:absolute;inset:0;background:var(--red-600);mix-blend-mode:color;opacity:.55}
.cap{position:absolute;left:12px;bottom:10px;z-index:2;font-family:var(--font-condensed);font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-size:12px;color:#fff}</style></head>
<body>
<div class="fr grad"><img src="../assets/photos/pitching-royal.jpg" alt=""><span class="cap">Protection gradient</span></div>
<div class="fr duo"><img src="../assets/photos/pitching-black.jpg" alt=""><span class="cap">Royal duotone</span></div>
</body></html>
