<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-page);padding:26px 24px;display:flex;gap:26px;align-items:center;font-family:var(--font-condensed)}.box{width:96px;height:96px;background:#fff;border:1px solid var(--border-subtle);display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font-weight:700;font-size:12px;color:var(--gray-500);text-transform:uppercase}</style></head>
<body>
<div class="box" style="border-radius:var(--radius-md);box-shadow:var(--shadow-md)">md · 10</div>
<div class="box" style="border-radius:var(--radius-lg);box-shadow:var(--shadow-lg)">lg · 16</div>
<div class="box" style="border-radius:var(--radius-pill);width:150px">pill</div>
<div class="box" style="border-radius:var(--radius-md);border:2px solid var(--ink-900);box-shadow:var(--shadow-hard)">hard</div>
</body></html>
