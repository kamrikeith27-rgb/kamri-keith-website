<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="8px base + half steps" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-page);padding:20px 24px;font-family:var(--font-condensed)}.r{display:flex;align-items:center;gap:12px;margin-bottom:8px}.bar{height:14px;background:var(--red-600);border-radius:3px}.lbl{font-weight:700;font-size:12px;color:var(--gray-500);width:96px;text-transform:uppercase;letter-spacing:.06em}</style></head>
<body>
<div class="r"><span class="lbl">2 · 8px</span><div class="bar" style="width:8px"></div></div>
<div class="r"><span class="lbl">4 · 16px</span><div class="bar" style="width:16px"></div></div>
<div class="r"><span class="lbl">5 · 24px</span><div class="bar" style="width:24px"></div></div>
<div class="r"><span class="lbl">6 · 32px</span><div class="bar" style="width:32px"></div></div>
<div class="r"><span class="lbl">7 · 48px</span><div class="bar" style="width:48px"></div></div>
<div class="r"><span class="lbl">8 · 64px</span><div class="bar" style="width:64px"></div></div>
</body></html>
