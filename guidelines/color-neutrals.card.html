<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — Ink & Field" subtitle="Night black through chalk" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-page);font-family:var(--font-condensed)}.row{display:flex;height:150px}.sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:10px}.sw b{font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.05em}.sw span{font-size:10px;opacity:.85}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--ink-900);color:#fff"><b>Ink 900</b><span>#0F1216</span></div>
<div class="sw" style="background:var(--ink-700);color:#fff"><b>Ink 700</b><span>#252B34</span></div>
<div class="sw" style="background:var(--gray-500);color:#fff"><b>Gray 500</b><span>#6B7280</span></div>
<div class="sw" style="background:var(--gray-300);color:var(--ink-900)"><b>Gray 300</b><span>#CBD2DB</span></div>
<div class="sw" style="background:var(--gray-100);color:var(--ink-900)"><b>Gray 100</b><span>#F1F4F8</span></div>
<div class="sw" style="background:var(--field);color:var(--ink-900);border-left:1px solid var(--gray-200)"><b>Field</b><span>#F4F6FB</span></div>
<div class="sw" style="background:#fff;color:var(--ink-900);border-left:1px solid var(--gray-200)"><b>Chalk</b><span>#FFFFFF</span></div>
</div></body></html>
