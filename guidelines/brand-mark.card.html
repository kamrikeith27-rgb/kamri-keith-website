<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-page);padding:26px 24px;display:flex;gap:28px;align-items:center}
.mark{width:104px;height:104px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);box-shadow:var(--shadow-hard);border:5px solid var(--ink-900)}
.wm{font-family:var(--font-display);text-transform:uppercase;line-height:.86;color:var(--ink-900)}</style></head>
<body>
<div class="mark" style="border-radius:50%;background:var(--red-600);border-color:var(--red-600);color:#fff;font-size:64px">5</div>
<div class="mark" style="border-radius:12px;background:var(--ink-900);border-color:var(--ink-900);color:#fff;font-size:46px">K5</div>
<div class="mark" style="border-radius:50%;background:var(--gold-500);border-color:var(--gold-500);color:var(--ink-900);font-size:64px">5</div>
<div>
<div class="wm" style="font-size:40px">Kamri<br>Keith</div>
<div style="font-family:var(--font-condensed);font-weight:700;text-transform:uppercase;letter-spacing:.14em;font-size:12px;color:var(--red-600);margin-top:6px">RHP · #5</div>
</div>
</body></html>
