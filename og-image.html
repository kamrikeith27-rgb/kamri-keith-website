<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1200px; height: 630px; background: linear-gradient(135deg, #CE1B2D 0%, #0F1216 100%); display: flex; align-items: center; justify-content: center; font-family: 'Oswald', Arial, sans-serif; }
    .container { text-align: center; color: white; padding: 60px; }
    .number { font-size: 180px; font-weight: bold; letter-spacing: 20px; margin-bottom: 20px; }
    .name { font-size: 120px; font-weight: bold; letter-spacing: 8px; margin-bottom: 20px; text-transform: uppercase; }
    .tagline { font-size: 48px; font-weight: 300; letter-spacing: 4px; opacity: 0.9; margin-bottom: 30px; }
    .meta { font-size: 36px; letter-spacing: 2px; opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="number">00</div>
    <div class="name">Kamri Keith</div>
    <div class="tagline">Class of 2027</div>
    <div class="meta">Utility · Catcher / Center Field / Infield</div>
  </div>
</body>
</html>
