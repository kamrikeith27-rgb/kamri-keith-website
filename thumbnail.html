<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="styles.css">
<style>
  html,body{margin:0}
  .tile{width:1280px;height:854px;display:flex;background:var(--red-600)}
  .main{width:75%;display:flex;align-items:center;justify-content:center;position:relative}
  .name{font-family:var(--font-display);text-transform:uppercase;color:#fff;text-align:center;line-height:.84;font-size:210px;letter-spacing:-.01em}
  .num{position:absolute;top:70px;right:70px;font-family:var(--font-display);color:var(--gold-500);font-size:200px;line-height:1;opacity:.9}
  .strip{width:25%;display:flex;flex-direction:column}
  .strip div{flex:1}
</style></head>
<body>
<div class="tile">
  <div class="main">
    <div class="num">5</div>
    <div class="name">Kamri<br>Keith</div>
  </div>
  <div class="strip">
    <div style="background:var(--gold-500)"></div>
    <div style="background:var(--clay-500)"></div>
    <div style="background:var(--red-800)"></div>
    <div style="background:var(--ink-900)"></div>
  </div>
</div>
</body></html>
